name: Sync Notion Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate required secrets
        id: secrets
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Notion secrets are missing. Add NOTION_API_KEY and NOTION_DATABASE_ID in repo Settings > Secrets and variables > Actions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch posts from Notion
        if: steps.secrets.outputs.ready == 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/fetch-notion-posts.mjs

      - name: Skip sync when secrets are missing
        if: steps.secrets.outputs.ready != 'true'
        run: echo "Skipping Notion sync because required secrets are not configured."

      - name: Commit and push if changed
        if: steps.secrets.outputs.ready == 'true'
        run: |
          if git diff --quiet -- notion-posts.json; then
            echo "No Notion post updates"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notion-posts.json
          git commit -m "Sync posts from Notion"
          git push
