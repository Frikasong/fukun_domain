name: Sync Notion Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode (discover DB properties)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate required secrets
        id: secrets
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Notion secrets are missing. Add NOTION_API_KEY and NOTION_DATABASE_ID in repo Settings > Secrets and variables > Actions."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch posts from Notion
        id: fetch
        if: steps.secrets.outputs.ready == 'true'
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DEBUG_NOTION_PROPERTIES: ${{ inputs.debug == 'true' && 'true' || '' }}
        run: node scripts/fetch-notion-posts.mjs

      - name: Print fetched post count
        if: steps.secrets.outputs.ready == 'true' && steps.fetch.outcome == 'success'
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('notion-posts.json','utf8'));console.log('Fetched entries:',(p.entries||[]).length);"

      - name: Report fetch issue and continue
        if: steps.secrets.outputs.ready == 'true' && steps.fetch.outcome != 'success'
        run: echo "Notion sync failed (likely credentials, DB sharing, or schema mismatch). Keeping previous notion-posts.json and continuing."

      - name: Skip sync when secrets are missing
        if: steps.secrets.outputs.ready != 'true'
        run: echo "Skipping Notion sync because required secrets are not configured."

      - name: Commit and push if changed
        if: steps.secrets.outputs.ready == 'true' && steps.fetch.outcome == 'success' && inputs.debug != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notion-posts.json notion-images/
          if git diff --cached --quiet; then
            echo "No Notion post updates"
            exit 0
          fi
          git commit -m "Sync posts and images from Notion"
          git push
