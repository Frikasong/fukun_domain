name: Update News Radar

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build news feed
        run: node scripts/fetch-news.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- news-feed.json; then
            echo "No news updates to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-feed.json
          git commit -m "Auto-update news feed"
          git push
