<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Fukun</title>
  <meta name="description" content="Fukun — J.D. candidate at Osgoode Hall Law School. Legal AI Lab: insights on law, AI, and technology. Tools, observations, and writing at the intersection of law and tech.">
  
  <!-- React and ReactDOM from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone for JSX transformation -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  
  <!-- Expose React hooks as globals BEFORE App.jsx loads -->
  <script>
    if (typeof React !== 'undefined') {
      window.useState = React.useState;
      window.useEffect = React.useEffect;
      window.useRef = React.useRef;
      console.log('Globals set');
    }
  </script>

  <!-- Mammoth for .docx parsing -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root {
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- LocalStorage-based storage implementation -->
  <script>
    // Simple localStorage wrapper that mimics the window.storage API
    window.storage = {
      async get(key, shared = false) {
        try {
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          const value = localStorage.getItem(storageKey);
          return value ? { key, value, shared } : null;
        } catch (error) {
          console.error('Storage get error:', error);
          return null;
        }
      },
      
      async set(key, value, shared = false) {
        try {
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          localStorage.setItem(storageKey, value);
          return { key, value, shared };
        } catch (error) {
          console.error('Storage set error:', error);
          return null;
        }
      },
      
      async delete(key, shared = false) {
        try {
          const storageKey = shared ? `shared_${key}` : `user_${key}`;
          localStorage.removeItem(storageKey);
          return { key, deleted: true, shared };
        } catch (error) {
          console.error('Storage delete error:', error);
          return null;
        }
      },
      
      async list(prefix = '', shared = false) {
        try {
          const keys = [];
          const storagePrefix = shared ? 'shared_' : 'user_';
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith(storagePrefix + prefix)) {
              keys.push(key.replace(storagePrefix, ''));
            }
          }
          return { keys, prefix, shared };
        } catch (error) {
          console.error('Storage list error:', error);
          return { keys: [], prefix, shared };
        }
      }
    };
  </script>
  
  <!-- Load the App component -->
  <script type="text/babel" src="App.jsx?v=14"></script>
  
  <!-- App renders itself at the bottom of App.jsx after defining all components -->
</body>
</html>
